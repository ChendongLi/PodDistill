# PodDistill — Podcast Registry
# Each show needs: name, channel_id, network, and either:
#   keywords: list of lowercase title substrings (first title match wins)
#   first_match: true  — skip keyword filter; return first non-Shorts video meeting duration threshold

podcasts:
  # ── Bloomberg ────────────────────────────────────────────────────────────────
  - name: Bloomberg Businessweek
    network: Bloomberg
    channel_id: UCIALMKvObZNtJ6AmdCLP7Lg
    keywords:
      - businessweek

  # ── Goldman Sachs ─────────────────────────────────────────────────────────────
  - name: Goldman Sachs The Markets
    network: Goldman Sachs
    channel_id: UCyz6-taovlaOkPsPtK4KNEg
    keywords:
      - the markets
      - market stress
      - market volatility

  # ── Morgan Stanley ────────────────────────────────────────────────────────────
  # Episode titles are topic-specific and don't contain "thoughts on the market"
  # e.g. "Japan's Bull Market Takes Shape", "The Looming Bottleneck for Global Tech"
  - name: Morgan Stanley Thoughts on the Market
    network: Morgan Stanley
    channel_id: UCz6RzD6KG_hH_oHb2kyW5jQ
    first_match: true

  # ── CNBC ──────────────────────────────────────────────────────────────────────
  - name: Mad Money
    network: CNBC
    channel_id: UCrp_UI8XtuYfpiqluWLD7Lw
    keywords:
      - mad money
