# PodDistill — Podcast Registry
# Fields:
#   name        — display name
#   network     — publisher name
#   channel_id  — YouTube channel ID; used with keywords for title-match episode discovery
#   playlist_id — YouTube playlist ID; when set, picks the most recent video from the playlist
#                 (ignores channel_id/keywords/first_match)
#   keywords    — lowercase title substrings to match within channel_id videos (any match wins)
#   first_match — if true, skip keyword filter and return the newest non-short video in the channel

podcasts:
  # ── Bloomberg ────────────────────────────────────────────────────────────────
  - name: Bloomberg Businessweek
    network: Bloomberg
    channel_id: UCIALMKvObZNtJ6AmdCLP7Lg
    keywords:
      - businessweek

  # ── Goldman Sachs ─────────────────────────────────────────────────────────────
  - name: Goldman Sachs The Markets
    network: Goldman Sachs
    playlist_id: PLIyiGQywEp66lKvfhiDbiuZnCboYneuX2

  # ── Morgan Stanley ────────────────────────────────────────────────────────────
  - name: Morgan Stanley Thoughts on the Market
    network: Morgan Stanley
    playlist_id: PLMUnYeeTvzNsu5Z2B17k_VlzOPnB45A1n

  # ── CNBC ──────────────────────────────────────────────────────────────────────
  - name: Mad Money
    network: CNBC
    channel_id: UCrp_UI8XtuYfpiqluWLD7Lw
    keywords:
      - mad money
