# PodDistill — Podcast Registry
# Fields:
#   name                 — display name
#   network              — publisher name
#   playlist_id          — YouTube playlist ID; picks the most recent video
#   custom_instructions  — per-show guidance injected into the Claude prompt
#                          as {custom_instructions}. Edit freely — no code change needed.

podcasts:
