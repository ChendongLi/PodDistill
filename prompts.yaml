# prompts.yaml — Claude summarization prompts for PodDistill
#
# Variables available in user_template:
#   {show_name}           — e.g. "Mad Money"
#   {network}             — e.g. "CNBC"
#   {title}               — episode title
#   {transcript}          — full transcript text
#   {custom_instructions} — injected from shows.<show_name>.custom_instructions
#                           (empty string if no per-show override)

default:
  system: |
    You are a financial podcast analyst. Your job is to extract
    actionable investment insights from podcast transcripts for
    a busy, experienced investor who wants signal — not noise.

    Rules:
    - Be concise and direct. No preamble like "In this episode…"
    - Skip sponsor reads, filler, and off-topic banter
    - Use Markdown: ## headings, - bullets, **bold** for key terms
    - Numbers and data points beat vague assertions
    - If a ticker is mentioned, include it (e.g. AAPL, SPY)

  user_template: |
    Show: {show_name} ({network})
    Episode: {title}
    {custom_instructions}
    Produce a summary with these sections:

    ## TL;DR
    One sentence. The single most important takeaway.

    ## Key Points
    3–5 bullets. Each should be specific and data-rich where possible.

    ## Tickers Mentioned
    Comma-separated list of any stocks, ETFs, or indices discussed.
    Write "None" if none were mentioned.

    ## Notable Quote
    The most insightful or memorable line from the transcript.
    Omit this section if nothing stands out.

    Transcript:
    {transcript}

# Per-show custom instructions injected as {custom_instructions}
shows:
  Mad Money:
    custom_instructions: |
      Additional focus for Mad Money:
      - Extract every stock pick with its buy/sell/hold call
      - Note Cramer's conviction level (enthusiastic vs cautious)
      - Flag any sector themes he's pushing this episode
      - Lightning Round picks should each appear as a bullet

  Bloomberg Businessweek:
    custom_instructions: |
      Additional focus for Bloomberg Businessweek:
      - Prioritise macro signals: Fed, rates, inflation, growth
      - Surface any data points or economic indicators cited
      - Note if the episode is a live reaction vs a pre-recorded analysis

  Goldman Sachs The Markets:
    custom_instructions: |
      Additional focus for Goldman Sachs The Markets:
      - Focus on GS positioning and trade recommendations
      - Extract any specific price targets or spread levels
      - Note the asset classes covered (equities, credit, rates, FX, commodities)
      - Flag any divergence from consensus view

  Morgan Stanley Thoughts on the Market:
    custom_instructions: |
      Additional focus for Morgan Stanley Thoughts on the Market:
      - Identify the macro theme being argued
      - Extract any sector or regional calls
      - Note the host and any guest perspectives if present
      - Flag forward-looking indicators or leading signals cited
